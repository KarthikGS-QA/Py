<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MATERNAL HEALTH RISK IDENTIFIER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <style>
        body{
            background-image: url(/static/wallpaper.jpg);
            background-size: cover;
        }
        td{
            color: white;
        }
    </style>
</head>
<body>
    <header class="bg-primary text-white">
        <h1>
            <marquee behavior="" direction="">
                MATERNAL HEALTH RISK IDENTIFIER
            </marquee>
        </h1>
    </header>

    <div class="row" align="center">
        <div class="container col-md-4 shadow p-3 mb-3 bg-success rounded text-white">
            <h2>Login To Continue</h2>
            <form action="/login" method="post">
                <table class="table table-borderless">
                    <tr>
                        <td>
                            User Name
                        </td>
                        <td>
                            <input type="text" name="username" required="true">
                        </td>

                    </tr>
                    <tr>
                        <td>Passwprd</td>
                        <td>
                            <input type="password" name="password" required="true">
                        </td>
                    </tr>
                    <tr>
                        <td colspan="2" align="center">
                            <input type="submit" value="Login" class="btn btn-primary btn-lg">
                        </td>
                    </tr>

                </table>
            </form>

        </div>
    </div>

    {% if msg %}
        <div  class="container alert col-md-4 alert-danger alert-dismissible fade show" role="alert">
        <strong> Login Failed !!</strong> 
    
        <button type="button"
            class="btn-close"
            data-bs-dismiss="alert"
            aria-label="Close"></button>
        </div>
        
    {% endif %}
</body> 

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</html>
