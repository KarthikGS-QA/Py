<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

    <title>MATERNAL HEALTH RISK IDENTIFIER</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <style>
        body{
            background-image: url(/static/wallpaper.jpg);
            background-size: cover;
        }
        
        
    </style>

<body>
    <header class="bg-primary text-white">
        <h1>
            <marquee behavior="" direction="">
                 MATERNAL HEALTH RISK IDENTIFIER
            </marquee>
        </h1>
    </header>

    <div class="row shadow p-3 mb-5  rounded text-white">

        <div class="row container  col-md-7">
                <h3>Input the parameters</h3>
                <form action="/predict" method="post">
                    <table class="table table-borderless text-white">
                        <tr>
                            <td>AGE</td>
                            <td>
                                <input type="text" name="AGE" required="true">
                            </td>
                        </tr>
                        <tr>
                            <td>SystolicBP</td>
                            <td>
                                <input type="text" name="SystolicBP" required="true">
                            </td>
                        </tr>
                        <tr>
                            <td>DiastolicBP</td>
                            <td>
                                <input type="text" name="DiastolicBP" required="true">
                            </td>
                        </tr>
                        <tr>
                            <td>BS</td>
                            <td>
                                <input type="text" name="BS" required="true">
                            </td>
                        </tr>
                        <tr>
                            <td>BodyTemp</td>
                            <td>
                                <input type="text" name="BodyTemp" required="true">
                            </td>
                        </tr>
                        <tr>
                            <td>HeartRate</td>
                            <td>
                                <input type="text" name="HeartRate" required="true">
                            </td>
                        </tr>
                        <tr>
                            <td colspan="2">
                                <input type="submit" class="btn" value="IDENTIFY RISK" style="background-color: black; color: white;">
                            </td>
                        </tr>

                    </table>
                </form>
        </div>
        <div class="container strong text-white col-md-4">
           

            {% if risk %}
                
                    <h1><strong>Identified Risk is: {{ risk }}</strong></h1> 
                
            {% endif %}
        </div>
    </div>

</body>
</html>
