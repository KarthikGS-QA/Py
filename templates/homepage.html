<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crop Recomendation System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">

    <style>
        body{
            background-image: url(/static/bgc.webp);
            background-size: cover;
        }

        td{
            color: rgb(0, 0, 0);
            font-weight: bold;      /* Makes the text bold */
            font-size: 1.2rem;
        }

        h3{
            color: rgb(12, 7, 140);
        }
        p{
            color: rgb(0, 0, 0);
            font-weight: bold;      /* Makes the text bold */
            font-size: 1.9rem;
        }
    </style>
</head>
<body>
    <header class="bg-primary text-white">
        <h1>
            <marquee behavior="" direction="">
                ML Based Crop Recomendation System 
            </marquee>
        </h1>
    </header>

    <div class="row container">
        <div class="container text-danger shadow p-3 m3 col-md-4">
            <h3>Input the parameters</h3>

            <form action="/predict" method="post">

                <table class="table-borderless">

                    <tr>
                        <td>
                            N
                        </td>
                        <td>
                            <input type="text" name="n" required="true"/>
                        </td>
                    </tr>
                    
                    <tr>
                        <td>
                            P
                        </td>
                        <td>
                            <input type="text" name="p" required="true"/>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            k
                        </td>
                        <td>
                            <input type="text" name="k" required="true"/>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            Temparature
                        </td>
                        <td>
                            <input type="text" name="temp" required="true"/>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            Humidity
                        </td>
                        <td>
                            <input type="text" name="humidity" required="true"/>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            Ph
                        </td>
                        <td>
                            <input type="text" name="ph" required="true"/>
                        </td>
                    </tr>

                    <tr>
                        <td>
                            Rainfall
                        </td>
                        <td>
                            <input type="text" name="rainfall" required="true"/>
                        </td>
                    </tr>

                    <tr>
                        <td colspan="2">
                            <input type="submit" class="btn-primary" value=" Recommend Crop">
                        </td>
                    </tr>

                </table>

            </form>
        </div>

        <div class="container text-danger shadow p-3 m3 col-md-4">
            {% if crop %}
                
                <p>
                    <strong>
                        Recommended Crop is : {{crop}}
                    </strong>
                </p>

            {% endif %}
        </div>
    </div>
</body>
</html>
